services:
  microworkers-bot:
    build: .
    container_name: mwbot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./screenshots:/app/screenshots
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
